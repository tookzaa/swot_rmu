services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: swot_rmu_app
    restart: unless-stopped
    volumes:
      - app_code:/var/www/html
      - ./.env:/var/www/html/.env
    env_file:
      - .env
    networks:
      - swot_rmu_net

  nginx:
    image: nginx:alpine
    container_name: swot_rmu_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - app_code:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - swot_rmu_net

networks:
  swot_rmu_net:
    driver: bridge

volumes:
  app_code:
