services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: swot_rmu_app
    restart: unless-stopped
    volumes:
      - app_code:/var/www/html
    env_file:
      - .env
    networks:
      - swot_rmu_net

  nginx:
    build:
      context: docker/nginx
      dockerfile: Dockerfile
    container_name: swot_rmu_nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - app_code:/var/www/html:ro
    depends_on:
      - app
    networks:
      - swot_rmu_net

networks:
  swot_rmu_net:
    driver: bridge

volumes:
  app_code:
